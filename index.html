<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CryptoShield | Encryption System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- CryptoJS AES Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

</head>


<body>


<!-- ================= INTRO SCREEN ================= -->

<div id="intro">

    <h1 class="logo">
        CRYPTOSHIELD
    </h1>

</div>



<!-- Floating Background Effects -->

<div class="blob blob-one"></div>
<div class="blob blob-two"></div>



<!-- ================= HOME PAGE ================= -->

<section id="homePage">


    <div class="card">


        <div class="card-content">


            <img 
            src="https://images.unsplash.com/photo-1587614382346-4ec70e388b28?q=80&w=800"
            class="hero-img"
            alt="Cyber Security">


            <div class="text-box">


                <h1 class="title">
                    Welcome To CryptoShield
                </h1>


                <p class="subtitle">
                    Secure Inscription Encryption Management System
                </p>


                <button class="btn" onclick="startApp()">
                    Get Started
                </button>


            </div>


        </div>


    </div>


</section>





<!-- ================= TOOL PAGE ================= -->

<section id="toolPage">


<div class="container">


<h1>
    🔐 Multi Encryption Tool
</h1>



<label>
    Select Algorithm
</label>


<select id="algo">

<option value="aes">
AES Encryption
</option>

<option value="rsa">
RSA Encryption
</option>


<option value="base64">
Base64 Encode / Decode
</option>


<option value="caesar">
Caesar Cipher
</option>


<option value="rot13">
ROT13
</option>


<option value="binary">
Binary Converter
</option>


</select>





<label>
    Enter Text
</label>


<textarea 
id="inputText"
placeholder="Enter your message here...">
</textarea>





<label>
    Secret Key / Shift Value
</label>


<input 
type="text"
id="secretKey"
placeholder="Enter key">





<div class="buttons">


<button class="toolbtn" onclick="encrypt()">
Encrypt
</button>



<button class="toolbtn" onclick="decrypt()">
Decrypt
</button>



<button class="toolbtn" onclick="generateRSA()">
Generate RSA Keys
</button>



<button class="toolbtn" onclick="clearAll()">
Clear
</button>


</div>





<label>
    Output
</label>


<textarea 
id="outputText"
readonly
placeholder="Result appears here...">
</textarea>



</div>


</section>





<!-- JavaScript -->

<script src="script.js"></script>


</body>

</html>
